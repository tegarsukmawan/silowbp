services:
  postgres:
    image: postgres:16-alpine
    container_name: silowbp-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: silowbp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - silowbp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d silowbp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  silowbp_postgres_data:
